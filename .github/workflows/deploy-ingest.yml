# ── Deploy Ingest Service ───────────────────────────────────────────────────────
# Builds and deploys the flowcraft-ingest Fastify container on push to main
# when ingest source changes.
#
# Deploys to Fly.io. Requires:
#   Secret: FLY_API_TOKEN
#   fly.toml in packages/ingest/ (created by `fly launch`)
name: Deploy Ingest

on:
  push:
    branches: [main]
    paths:
      - "packages/ingest/**"
      - "packages/shared/**"
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @flowcraft/ingest test:unit

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Deploy
        run: flyctl deploy --config packages/ingest/fly.toml --dockerfile packages/ingest/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        env:
          HEALTH_URL: https://ingest.flowcraft.systems/health
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: /health returned $STATUS — retrying in 5s"
            sleep 5
          done
          echo "::error::Smoke test failed after 6 attempts"
          exit 1
