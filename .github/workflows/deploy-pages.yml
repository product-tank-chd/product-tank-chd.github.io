# ── Build Vite SPA and Deploy to GitHub Pages ────────────────────────────────────
# Builds packages/dashboard (Vite + React SPA) with Supabase cloud credentials
# and deploys the output to GitHub Pages at flowcraft.systems.
#
# Prerequisites:
#   Settings → Pages → Source = "GitHub Actions"
#   Settings → Secrets → Actions — four secrets required (see Validate step)
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/dashboard/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Dashboard SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets are configured
        # Guards against accidentally deploying with empty secrets.
        # Required secrets (Settings → Secrets and variables → Actions):
        #   SUPABASE_URL      — Supabase cloud project URL (https://<ref>.supabase.co)
        #   SUPABASE_ANON_KEY — Supabase project anon (public) key
        #   INGEST_URL        — Production ingest service URL
        #   DASHBOARD_URL     — https://flowcraft.systems
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_URL:        ${{ secrets.INGEST_URL }}
          DASHBOARD_URL:     ${{ secrets.DASHBOARD_URL }}
        run: |
          missing=""
          [ -z "$SUPABASE_URL" ]      && missing="$missing SUPABASE_URL"
          [ -z "$SUPABASE_ANON_KEY" ] && missing="$missing SUPABASE_ANON_KEY"
          [ -z "$INGEST_URL" ]        && missing="$missing INGEST_URL"
          [ -z "$DASHBOARD_URL" ]     && missing="$missing DASHBOARD_URL"
          if [ -n "$missing" ]; then
            echo "::error::Required GitHub secrets not configured:$missing"
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets present."

      - name: Inject production config into docs/signup.html
        # 12-factor: config comes from the environment, not source code.
        # done BEFORE the Vite build so the build script's copy picks up the
        # substituted file: `cp ../../docs/signup.html dist/signup.html`
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_URL:        ${{ secrets.INGEST_URL }}
          DASHBOARD_URL:     ${{ secrets.DASHBOARD_URL }}
        run: |
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g"           docs/signup.html
          sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" docs/signup.html
          sed -i "s|__INGEST_URL__|${INGEST_URL}|g"               docs/signup.html
          sed -i "s|__DASHBOARD_URL__|${DASHBOARD_URL}|g"         docs/signup.html

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard SPA
        # VITE_* variables are baked into the static JS bundle at compile time.
        # Only use the anon key here — the service_role key must NEVER appear.
        env:
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm --filter @flowcraft/dashboard build

      - name: Verify — no sentinel tokens remain in dist/
        run: |
          if grep -rn '__SUPABASE_URL__\|__SUPABASE_ANON_KEY__\|__INGEST_URL__\|__DASHBOARD_URL__' packages/dashboard/dist/; then
            echo "::error::Unsubstituted sentinel tokens found in dist/ — check the build step"
            exit 1
          fi
          echo "Sentinel check passed — all tokens substituted."

      - name: Validate HTML
        run: |
          for f in packages/dashboard/dist/*.html; do
            python3 -c "
          from html.parser import HTMLParser
          class Check(HTMLParser): pass
          c = Check()
          with open('$f') as fh: c.feed(fh.read())
          print('OK: $f')
          "
          done

      - name: Security — verify no secrets in static assets
        run: |
          # Fail if any file contains a service_role key.
          # Check 1: decoded JSON text ("role":"service_role")
          # Check 2: base64-encoded "service_role" (c2VydmljZV9yb2xl) in JWTs
          # Note: Supabase anon keys are safe for browser use and are NOT flagged.
          if grep -rn -E '"role":"service_role"|c2VydmljZV9yb2xl' packages/dashboard/dist/; then
            echo "::error::Supabase service-role key found in dist/ — remove before deploying to GitHub Pages"
            exit 1
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/dashboard/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
