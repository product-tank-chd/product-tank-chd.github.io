# ── Publish npm Packages ────────────────────────────────────────────────────────
# Publishes @flowcraft.systems/shared and @flowcraft.systems/cli to npm on version tags.
#
# Trigger: push a tag matching v* (e.g., v0.2.0)
#
# Required secret: NPM_TOKEN (npm automation token)
name: Publish npm

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "22"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:unit

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/shared/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME → $TAG_VERSION but package.json says $PKG_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Publish @flowcraft.systems/shared
        run: pnpm --filter @flowcraft.systems/shared publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @flowcraft.systems/cli
        run: pnpm --filter @flowcraft.systems/cli publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
